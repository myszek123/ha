alias: Tesla Charging - Security - Autel lockdown when Myszolot away
description: >
  Security gate for the Autel charger. When the Tesla is away,
  forces the Autel charger off. When the Tesla is home, takes no action.
  A 5-minute watchdog trigger self-heals any state drift.
triggers:
  - trigger: time_pattern
    minutes: /1
actions:
  - if:
      - condition: template
        value_template: "{{ not is_state('device_tracker.myszolot_location', 'home') and is_state('switch.autel_charge_control', 'on') }}"
    then:
      - action: switch.turn_off
        target:
          entity_id: switch.autel_charge_control
mode: single

