<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#f0f0f0" stroke="#333" stroke-width="2"/>

  <!-- Tesla charging port stylized -->
  <g transform="translate(50, 50)">
    <!-- Main charging plug base -->
    <rect x="-12" y="-20" width="24" height="28" rx="4" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>

    <!-- Charging pin -->
    <circle cx="0" cy="8" r="3.5" fill="#f39c12"/>

    <!-- Charging bolt overlay -->
    <path d="M -3,-8 L 2,-2 L -1,0 L 3,8 L -2,4 L 1,2 Z" fill="#fff" opacity="0.9"/>

    <!-- G12 indicator band -->
    <rect x="-12" y="-4" width="24" height="2" fill="#27ae60"/>
  </g>
</svg>
